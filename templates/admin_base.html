{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ShopSmart Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->

    <div class="bg-dark text-white p-3 shadow"
     style="width:270px;min-height:100vh;">

    <h2 class="text-center mb-4">
        🛒 ShopSmart
    </h2>

    <small class="text-secondary">
        ADMIN PANEL
    </small>

    <hr>

    <a href="{% url 'dashboard' %}"
       class="btn btn-dark w-100 text-start mb-2">
        📊 Dashboard
    </a>

    <a href="{% url 'manage_orders' %}"
       class="btn btn-dark w-100 text-start mb-2">
        📦 Orders
    </a>

    <a href="{% url 'admin_products' %}"
       class="btn btn-dark w-100 text-start mb-2">
        🛍 Products
    </a>

    <a href="{% url 'reports' %}"
       class="btn btn-dark w-100 text-start mb-2">
        📈 Reports
    </a>

    <a href="{% url 'export_excel' %}"
       class="btn btn-dark w-100 text-start mb-2">
        📥 Export Excel
    </a>

    <hr>

    <a href="/"
       class="btn btn-success w-100 mb-2">
        🏠 Visit Shop
    </a>

    <a href="/logout/"
       class="btn btn-danger w-100">
        🚪 Logout
    </a>

</div>

    <!-- Main Content -->

    <div class="flex-grow-1">

<nav class="navbar bg-white shadow-sm">

<div class="container-fluid">

<h4 class="mb-0">
Admin Dashboard
</h4>

<div>

👋 Welcome,
<strong>
{{ request.user.get_full_name|default:request.user.username }}
</strong>

</div>

</div>

</nav>

<div class="p-4">

{% block content %}

{% endblock %}

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
