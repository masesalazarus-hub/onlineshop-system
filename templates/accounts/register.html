{% load static %}

<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link rel="stylesheet"
href="{% static 'css/style.css' %}">
</head>

<body>

<div class="form-container">

<h2>Create Account</h2>

<form method="POST">

{% csrf_token %}

<div class="form-group">
<input type="text"
name="username"
placeholder="Username">
</div>

<div class="form-group">
<input type="email"
name="email"
placeholder="Email">
</div>

<div class="form-group">
<input type="password"
name="password"
placeholder="Password">
</div>

<button class="submit-btn">
Register
</button>

</form>

<br>

<center>
Already have account?
<a href="{% url 'login' %}">
Login
</a>
</center>

</div>

</body>
</html>
