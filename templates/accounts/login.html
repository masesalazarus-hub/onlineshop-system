{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="stylesheet"
href="{% static 'css/style.css' %}">

</head>

<body>

<div class="form-container">

<h2>Login</h2>

<form method="POST">

{% csrf_token %}

<div class="form-group">
<input type="text"
name="username"
placeholder="Username">
</div>

<div class="form-group">
<input type="password"
name="password"
placeholder="Password">
</div>

<button class="submit-btn">
Login
</button>

</form>

<br>

<center>
Don't have account?
<a href="{% url 'register' %}">
Register
</a>
</center>

</div>

</body>
</html>
