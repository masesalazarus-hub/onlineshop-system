{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2>Welcome Back</h2>

        <p>Login to continue shopping.</p>

        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <p class="auth-link">
            Don't have an account?

            <a href="/register/">
                Register
            </a>

        </p>

    </div>

</div>

{% endblock %}
