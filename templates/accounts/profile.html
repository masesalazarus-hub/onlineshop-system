{% extends 'base.html' %}

{% block content %}

<div class="profile-card">

    <h1>My Profile</h1>

    <div class="profile-info">

        <p>
            <strong>Username:</strong>
            {{ request.user.username }}
        </p>

        <p>
            <strong>Email:</strong>
            {{ request.user.email }}
        </p>

        <p>
            <strong>Date Joined:</strong>
            {{ request.user.date_joined }}
        </p>

    </div>

</div>

{% endblock %}
