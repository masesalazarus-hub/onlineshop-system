{% extends 'base.html' %}

{% block content %}

<h2 class="page-title">
Sales Report
</h2>
<a href="{% url 'export_excel' %}"
class="export-btn">

Export Excel

</a>

<table class="custom-table">

<thead>
<tr>
    <th>Order ID</th>
    <th>Customer</th>
    <th>Amount</th>
    <th>Status</th>
</tr>
</thead>

<tbody>

{% for order in orders %}

<tr>
    <td>{{ order.id }}</td>
    <td>{{ order.customer }}</td>
    <td>{{ order.total_amount }}</td>
    <td>{{ order.status }}</td>
</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
